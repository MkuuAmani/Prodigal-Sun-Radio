<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Prodigal Sun Radio</title>

<style>
body{
  margin:0;
  background:radial-gradient(circle at top,#111,#050505);
  font-family:Arial, sans-serif;
  color:#FFD700;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
}

/* CONTAINER */
.player{
  text-align:center;
  max-width:600px;
  width:95%;
}

/* HEADINGS */
h1{
  font-size:42px;
  margin-bottom:5px;
  letter-spacing:2px;
}

h2{
  font-size:18px;
  opacity:0.8;
  margin-bottom:20px;
}

/* COVER ART */
#cover{
  width:600px;
  height:600px;
  max-width:90vw;
  max-height:90vw;
  object-fit:cover;
  border-radius:50%;
  margin:0 auto 20px auto;
  display:block;
  box-shadow:0 0 35px rgba(255,215,0,0.7);
  animation: pulseCover 2.5s infinite ease-in-out;
}

@keyframes pulseCover{
  0% { transform: scale(1); box-shadow:0 0 35px rgba(255,215,0,0.6); }
  50% { transform: scale(1.04); box-shadow:0 0 60px rgba(255,215,0,1); }
  100% { transform: scale(1); box-shadow:0 0 35px rgba(255,215,0,0.6); }
}

/* TRACK */
#track{
  font-size:28px;
  margin-bottom:10px;
  min-height:40px;
  transition:opacity 0.4s ease;
}

/* LIVE BADGE */
.live{
  display:inline-block;
  padding:6px 16px;
  border-radius:20px;
  background:#300;
  color:#ff4d4d;
  font-size:16px;
  margin-bottom:20px;
  box-shadow:0 0 10px red;
  animation:pulse 1.5s infinite;
}

@keyframes pulse{
  0%{box-shadow:0 0 5px red}
  50%{box-shadow:0 0 20px red}
  100%{box-shadow:0 0 5px red}
}

/* AUDIO PLAYER */
audio{
  width:100%;
  margin-top:15px;
  filter: invert(1) hue-rotate(180deg);
}

/* TAGLINE */
.tagline{
  margin-top:25px;
  font-size:18px;
  opacity:0.85;
}

/* FOOTER */
.footer{
  margin-top:20px;
  font-size:14px;
  opacity:0.5;
}
</style>
</head>

<body>

<div class="player">
  <h1>Mkuu Amani</h1>
  <h2>Prodigal Sun Radio</h2>

  <img id="cover" src="https://i.imgur.com/QPevqGi.png">

  <div id="track">Loading...</div>
  <div class="live">● LIVE</div>

  <audio id="audio" controls>
    <source src="https://listen.radioking.com/radio/443393/stream/497783" type="audio/mpeg">
  </audio>

  <div class="tagline">
    🌍 Broadcasting Afro House • EDM • Dance • Reggae worldwide
  </div>

  <div class="footer">
    Rise With The Sun ☀️
  </div>
</div>

<script>
// ================= NOW PLAYING =================
const API = "https://api.radioking.io/widget/radio/the-channel-x/track/current";

let currentTrack = "";

async function updateTrack(){
  try{
    const res = await fetch(API,{cache:"no-store"});
    const data = await res.json();

    const newTrack = (data.artist || "Live") + " - " + (data.title || "Broadcast");

    if(newTrack !== currentTrack){
      currentTrack = newTrack;

      const trackEl = document.getElementById("track");
      trackEl.style.opacity = 0;

      setTimeout(()=>{
        trackEl.innerText = newTrack;
        trackEl.style.opacity = 1;
      },200);

      const cover = document.getElementById("cover");
      setTimeout(()=>{
        cover.src = data.cover || "https://i.imgur.com/QPevqGi.png";
      },300);
    }

  }catch{
    document.getElementById("track").innerText = "Live Broadcast";
  }
}

setInterval(updateTrack, 10000);
updateTrack();
</script>

</body>
</html>
