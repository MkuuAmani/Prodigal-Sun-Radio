<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Prodigal Sun Radio</title>

<style>
body{
  margin:0;
  background:radial-gradient(circle at top,#111,#050505);
  font-family:Arial, sans-serif;
  color:#FFD700;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

/* CONTAINER */
.player{
  text-align:center;
  max-width:600px;
  width:95%;
  margin:auto;
}

/* HEADINGS */
h1{
  font-size:40px;
  margin-bottom:10px;
  letter-spacing:2px;
}

h2{
  font-size:18px;
  opacity:0.8;
  margin-bottom:20px;
}

/* COVER ART */
#cover{
  width:600px;
  height:600px;
  max-width:90vw;
  max-height:90vw;
  object-fit:cover;
  border-radius:50%;
  margin:0 auto 20px auto;
  display:block;
  box-shadow:0 0 35px rgba(255,215,0,0.7);
  transition:opacity 0.5s ease, transform 0.5s ease;
}

/* TRACK */
#track{
  font-size:32px;
  margin-bottom:10px;
  min-height:40px;
  transition:opacity 0.4s ease;
}

/* LIVE BADGE */
.live{
  display:inline-block;
  padding:6px 16px;
  border-radius:20px;
  background:#300;
  color:#ff4d4d;
  font-size:16px;
  margin-bottom:20px;
  box-shadow:0 0 10px red;
  animation:pulse 1.5s infinite;
}

@keyframes pulse{
  0%{box-shadow:0 0 5px red}
  50%{box-shadow:0 0 20px red}
  100%{box-shadow:0 0 5px red}
}

/* AUDIO PLAYER (inverted) */
audio{
  width:100%;
  margin-top:15px;
  filter: invert(1) hue-rotate(180deg);
}
</style>
</head>

<body>

<div class="player">
  <h1>Mkuu Amani</h1>
  <h2>Prodigal Sun Radio</h2>

  <img id="cover" src="https://i.imgur.com/QPevqGi.png">

  <div id="track">Loading...</div>
  <div class="live">● LIVE</div>

  <audio id="audio" controls>
    <source src="https://listen.radioking.com/radio/443393/stream/497783" type="audio/mpeg">
  </audio>
</div>

<script>
// ================= STREAM =================
const audio = document.getElementById("audio");

// ================= NOW PLAYING =================
const API = "https://api.radioking.io/widget/radio/the-channel-x/track/current";

let currentTrack = "";

async function updateTrack(){
  try{
    const res = await fetch(API,{cache:"no-store"});
    const data = await res.json();

    const newTrack = (data.artist || "Live") + " - " + (data.title || "Broadcast");

    if(newTrack !== currentTrack){
      currentTrack = newTrack;

      const trackEl = document.getElementById("track");
      trackEl.style.opacity = 0;

      setTimeout(()=>{
        trackEl.innerText = newTrack;
        trackEl.style.opacity = 1;
      },200);

      const cover = document.getElementById("cover");
      cover.style.opacity = 0.3;
      cover.style.transform = "scale(0.95)";

      setTimeout(()=>{
        cover.src = data.cover || "https://i.imgur.com/QPevqGi.png";
        cover.style.opacity = 1;
        cover.style.transform = "scale(1)";
      },300);
    }

  }catch{
    document.getElementById("track").innerText = "Live Broadcast";
  }
}

setInterval(updateTrack, 10000);
updateTrack();
</script>

</body>
</html>

<!-- PRODIGAL SUN RADIO GLOBAL SCROLLING TICKER -->

<div class="psr-ticker">
  <div class="psr-label">PSR LIVE</div>
  <div class="psr-wrap">
    <div class="psr-move" id="psrTicker"></div>
  </div>
</div>

<style>
.psr-ticker{
display:flex;
align-items:center;
background:#0b0b0b;
border-radius:14px;
padding:10px 16px;
overflow:hidden;
font-family:system-ui,-apple-system,BlinkMacSystemFont,sans-serif;
}

.psr-label{
font-size:18px;
font-weight:700;
margin-right:14px;
color:#f7c873;
white-space:nowrap;
}

.psr-wrap{
flex:1;
overflow:hidden;
}

.psr-move{
display:inline-flex;
gap:56px;
white-space:nowrap;
}

.psr-move span{
font-size:18px;
color:#f7c873;
}

@keyframes scroll{
0%{transform:translateX(0)}
100%{transform:translateX(-50%)}
}

.psr-ticker:hover .psr-move{
animation-play-state:paused;
}
</style>

<script>
/* =========================
CONFIG
========================= */
const ticker=document.getElementById("psrTicker");
const scrollSpeed=55; // px per second

/* RADIOKING NOW PLAYING API */
const API="https://api.radioking.io/widget/radio/the-channel-x/track/current";

/* GLOBAL LISTENER API (Google Sheet) */
const LISTENER_API="https://script.google.com/macros/s/AKfycbwjgiFCMzDHYdbTUUtmkSdML5oXDIL1zmH5oOQ-g2s49FO2-U-LRs7fGja76dfy7yli_Q/exec";

let listeners=[];
let listenerIndex=0;
let welcomeIndex=0;

/* =========================
SHOUTOUTS & PROMOS
========================= */
const cities=[
"Walsall","Birmingham","London","Wolverhampton","Coventry","Nottingham","Cannock","Lagos","Elba","Poole","Sutton","Glasgow","Sterling","Tipton","Paris","Nice","Toxteth","Leeds","Turin","Bristol",
"Toronto","Kingston","New York"
];

const stationMessages=[
"🎧 You're listening to Prodigal Sun Radio — Rise With The Sun",
"🔥 Peace Love & House Show",
"☀️ Sunny Galaxy - lighting up the airwaves",
"🎶 Afro House • EDM • Dance • House •Reggae",
"🌍 Independent radio supporting global music culture"
];

const welcomeMessages=[
"🎵 Welcome to Prodigal Sun Radio! Sign the guest book 🌍",
"💛 Let the world know you're listening!",
"🔥 Join the global listener roll call!",
"☀️ Share your city and spread the love!"
];

/* =========================
FLAGS
========================= */
const flags={
"UK":"🇬🇧","UNITED KINGDOM":"🇬🇧",
"USA":"🇺🇸","CANADA":"🇨🇦",
"JAMAICA":"🇯🇲","TRINIDAD":"🇹🇹","BARBADOS":"🇧🇧","GRENADA":"🇬🇩",
"SAINT LUCIA":"🇱🇨","ST LUCIA":"🇱🇨","BAHAMAS":"🇧🇸",
"CUBA":"🇨🇺","HAITI":"🇭🇹","DOMINICAN":"🇩🇴",
"GHANA":"🇬🇭","NIGERIA":"🇳🇬","SOUTH AFRICA":"🇿🇦","KENYA":"🇰🇪",
"ZIMBABWE":"🇿🇼","UGANDA":"🇺🇬","ETHIOPIA":"🇪🇹","SENEGAL":"🇸🇳",
"GERMANY":"🇩🇪","FRANCE":"🇫🇷","SPAIN":"🇪🇸","ITALY":"🇮🇹",
"BRAZIL":"🇧🇷","AUSTRALIA":"🇦🇺"
};

function getFlag(loc){
  loc=loc.toUpperCase();
  for(let k in flags){
    if(loc.includes(k)) return flags[k];
  }
  return "🌍";
}

/* =========================
LOAD LISTENERS
========================= */
async function loadListeners(){
  try{
    const res=await fetch(LISTENER_API);
    listeners=await res.json();
  }catch(e){ console.log("Listener load error",e); }
}
setInterval(loadListeners,60000);
loadListeners();

/* =========================
ROTATION LOGIC
========================= */
async function getNowPlaying(){
  try{
    const res=await fetch(API,{cache:"no-store"});
    const data=await res.json();
    const artist=data.artist||"Unknown Artist";
    const title=data.title||"Unknown Title";
    return `🎵 Now Playing: ${artist} – ${title}`;
  }catch(e){
    return "🎵 Music streaming live on Prodigal Sun Radio";
  }
}

function getShoutout(){
  const city=cities[Math.floor(Math.random()*cities.length)];
  return `💛 Shoutout to listeners in ${city}`;
}

function getListener(){
  if(listeners.length===0) return null;
  const l=listeners[listenerIndex];
  listenerIndex=(listenerIndex+1)%listeners.length;
  return `${l.flag} ${l.name} listening from ${l.location}`;
}

function getWelcome(){
  const msg=welcomeMessages[welcomeIndex];
  welcomeIndex=(welcomeIndex+1)%welcomeMessages.length;
  return msg;
}

/* =========================
BUILD TICKER CONTENT
========================= */
async function buildTicker(){
  ticker.innerHTML="";

  // Now Playing
  addToTicker(await getNowPlaying());

  // Shoutout
  addToTicker(getShoutout());

  // Station Promos
  stationMessages.forEach(msg=>addToTicker(msg));

  // Listener Roll Call or Welcome
  if(listeners.length>0){
    addToTicker(getListener());
  } else {
    addToTicker(getWelcome());
  }

  // Duplicate for smooth scroll
  ticker.innerHTML+=ticker.innerHTML;

  // Start scrolling
  const move=document.querySelector(".psr-move");
  const totalWidth=move.scrollWidth;
  const duration=totalWidth/scrollSpeed;
  move.style.animation=`scroll ${duration}s linear infinite`;
}

function addToTicker(text){
  const span=document.createElement("span");
  span.textContent=text;
  ticker.appendChild(span);
}

// initial build
buildTicker();

// refresh ticker every 20 minutes to rotate names/messages
setInterval(buildTicker,1200000);
</script>
