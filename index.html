<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Prodigal Sun Radio</title>

<style>
body{
  margin:0;
  background:radial-gradient(circle at top,#111,#050505);
  font-family:Arial, sans-serif;
  color:#FFD700;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

/* CONTAINER */
.player{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  max-width:700px;
  width:100%;
}

/* HEADINGS */
h1{
  font-size:40px;
  margin-bottom:10px;
}

h2{
  font-size:18px;
  opacity:0.8;
  margin-bottom:20px;
}

/* COVER */
#cover{
  width:600px;
  height:600px;
  max-width:90vw;
  max-height:90vw;
  object-fit:cover;
  border-radius:50%;
  margin:0 auto 20px auto;
  display:block;
  box-shadow:0 0 35px rgba(255,215,0,0.7);
  transition:0.5s;
}

/* TRACK */
#track{
  font-size:22px;
  margin-bottom:10px;
  min-height:40px;
}

/* LIVE BADGE */
.live{
  margin-top:5px;
  margin-bottom:20px;
  padding:6px 16px;
  border-radius:20px;
  background:#300;
  color:#ff4d4d;
  font-size:16px;
  box-shadow:0 0 10px red;
  animation:pulse 1.5s infinite;
}

@keyframes pulse{
  0%{box-shadow:0 0 5px red}
  50%{box-shadow:0 0 20px red}
  100%{box-shadow:0 0 5px red}
}

/* PLAY BUTTON */
#playBtn{
  background:#000;
  color:#fff;
  border:2px solid #FFD700;
  padding:14px 30px;
  font-size:20px;
  border-radius:30px;
  cursor:pointer;
  margin-top:10px;
  transition:0.3s;
}

#playBtn:hover{
  background:#FFD700;
  color:#000;
}

/* WAVEFORM */
canvas{
  width:100%;
  height:150px;
  background:#000;
  border-radius:10px;
  margin-top:20px;
}
</style>
</head>

<body>

<div class="player">
  <h1>Mkuu Amani</h1>
  <h2>Prodigal Sun Radio</h2>

  <img id="cover" src="https://i.imgur.com/QPevqGi.png">

  <div id="track">Loading...</div>

  <div class="live">● LIVE</div>

  <button id="playBtn">▶ PLAY</button>

  <canvas id="wave"></canvas>
</div>

<audio id="audio">
  <source src="https://listen.radioking.com/radio/443393/stream/497783" type="audio/mpeg">
</audio>

<script>
// AUDIO
const audio = document.getElementById("audio");
const playBtn = document.getElementById("playBtn");

// PLAY BUTTON
playBtn.addEventListener("click", () => {
  if(audio.paused){
    audio.play();
    playBtn.innerText = "⏸ PAUSE";
  } else {
    audio.pause();
    playBtn.innerText = "▶ PLAY";
  }
});

// NOW PLAYING
const API = "https://api.radioking.io/widget/radio/the-channel-x/track/current";

let currentTrack = "";

async function updateTrack(){
  try{
    const res = await fetch(API,{cache:"no-store"});
    const data = await res.json();

    const newTrack = (data.artist || "Live") + " - " + (data.title || "Broadcast");

    if(newTrack !== currentTrack){
      currentTrack = newTrack;

      const trackEl = document.getElementById("track");
      trackEl.style.opacity = 0;

      setTimeout(()=>{
        trackEl.innerText = newTrack;
        trackEl.style.opacity = 1;
      },200);

      const cover = document.getElementById("cover");
      cover.style.opacity = 0.3;
      cover.style.transform = "scale(0.95)";

      setTimeout(()=>{
        cover.src = data.cover || "https://i.imgur.com/QPevqGi.png";
        cover.style.opacity = 1;
        cover.style.transform = "scale(1)";
      },300);
    }

  }catch{
    document.getElementById("track").innerText = "Live Broadcast";
  }
}

setInterval(updateTrack, 10000);
updateTrack();


// WAVEFORM
let ctx, analyser, source;
const canvas = document.getElementById("wave");
const canvasCtx = canvas.getContext("2d");

function resize(){
  canvas.width = canvas.clientWidth;
  canvas.height = 150;
}
resize();
window.addEventListener("resize", resize);

function initAudio(){
  if(ctx) return;

  ctx = new (window.AudioContext || window.webkitAudioContext)();
  analyser = ctx.createAnalyser();
  source = ctx.createMediaElementSource(audio);

  source.connect(analyser);
  analyser.connect(ctx.destination);

  analyser.fftSize = 2048;

  const bufferLength = analyser.frequencyBinCount;
  const dataArray = new Uint8Array(bufferLength);

  function draw(){
    requestAnimationFrame(draw);

    analyser.getByteTimeDomainData(dataArray);

    canvasCtx.fillStyle = "#000";
    canvasCtx.fillRect(0, 0, canvas.width, canvas.height);

    canvasCtx.lineWidth = 2;
    canvasCtx.strokeStyle = "#FFD700";

    canvasCtx.beginPath();

    let sliceWidth = canvas.width / bufferLength;
    let x = 0;

    for(let i = 0; i < bufferLength; i++){
      let v = dataArray[i] / 128.0;
      let y = v * canvas.height / 2;

      if(i === 0){
        canvasCtx.moveTo(x, y);
      } else {
        canvasCtx.lineTo(x, y);
      }

      x += sliceWidth;
    }

    canvasCtx.lineTo(canvas.width, canvas.height / 2);
    canvasCtx.stroke();
  }

  draw();
}

// unlock audio + waveform
document.body.addEventListener("click", () => {
  initAudio();
  if(ctx) ctx.resume();
});
</script>

</body>
</html>
