<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Prodigal Sun Radio</title>

<style>
body{
  margin:0;
  background:radial-gradient(circle at top,#111,#050505);
  font-family:Arial, sans-serif;
  color:#FFD700;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* CONTAINER */
.player{
  text-align:center;
  max-width:420px;
  width:90%;
}

/* HEADINGS */
h1{
  font-size:26px;
  margin-bottom:5px;
  letter-spacing:2px;
}

h2{
  font-size:13px;
  opacity:0.7;
  margin-bottom:15px;
}

/* LIVE BADGE */
.live{
  display:inline-block;
  padding:4px 10px;
  border-radius:20px;
  background:#300;
  color:#ff4d4d;
  font-size:12px;
  margin-bottom:15px;
  box-shadow:0 0 10px red;
  animation:pulse 1.5s infinite;
}

@keyframes pulse{
  0%{box-shadow:0 0 5px red}
  50%{box-shadow:0 0 20px red}
  100%{box-shadow:0 0 5px red}
}

/* COVER ART */
#cover{
  width:220px;
  height:220px;
  object-fit:cover;
  border-radius:50%;
  margin-bottom:15px;
  box-shadow:0 0 35px rgba(255,215,0,0.7);
  transition:opacity 0.5s ease, transform 0.5s ease;
}

/* TRACK */
#track{
  font-size:18px;
  margin-bottom:15px;
  min-height:40px;
  transition:opacity 0.4s ease;
}

/* WAVEFORM */
canvas{
  width:100%;
  height:120px;
  background:#000;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="player">
  <h1>Mkuu Amani</h1>
  <h2>Prodigal Sun Radio</h2>

  <div class="live">● LIVE</div>

  <img id="cover" src="https://i.imgur.com/QPevqGi.png">

  <div id="track">Loading...</div>

  <canvas id="wave"></canvas>
</div>

<audio id="audio" crossorigin="anonymous" autoplay>
  <source src="https://listen.radioking.com/radio/443393/stream/497783" type="audio/mpeg">
</audio>

<script>
// ================= STREAM =================
const audio = document.getElementById("audio");

// ================= NOW PLAYING =================
const API = "https://api.radioking.io/widget/radio/the-channel-x/track/current";

let currentTrack = "";

async function updateTrack(){
  try{
    const res = await fetch(API,{cache:"no-store"});
    const data = await res.json();

    const newTrack = (data.artist || "Live") + " - " + (data.title || "Broadcast");

    if(newTrack !== currentTrack){
      currentTrack = newTrack;

      // fade text
      const trackEl = document.getElementById("track");
      trackEl.style.opacity = 0;

      setTimeout(()=>{
        trackEl.innerText = newTrack;
        trackEl.style.opacity = 1;
      },200);

      // update cover with animation
      const cover = document.getElementById("cover");
      cover.style.opacity = 0.3;
      cover.style.transform = "scale(0.95)";

      setTimeout(()=>{
        cover.src = data.cover || "https://i.imgur.com/QPevqGi.png";
        cover.style.opacity = 1;
        cover.style.transform = "scale(1)";
      },300);
    }

  }catch{
    document.getElementById("track").innerText = "Live Broadcast";
  }
}

setInterval(updateTrack, 10000);
updateTrack();


// ================= REAL WAVEFORM =================
const ctx = new AudioContext();
const analyser = ctx.createAnalyser();
const source = ctx.createMediaElementSource(audio);

source.connect(analyser);
analyser.connect(ctx.destination);

analyser.fftSize = 2048;

const bufferLength = analyser.frequencyBinCount;
const dataArray = new Uint8Array(bufferLength);

const canvas = document.getElementById("wave");
const canvasCtx = canvas.getContext("2d");

function resize(){
  canvas.width = canvas.clientWidth;
  canvas.height = 120;
}
resize();
window.addEventListener("resize", resize);

function draw(){
  requestAnimationFrame(draw);

  analyser.getByteTimeDomainData(dataArray);

  canvasCtx.fillStyle = "#000";
  canvasCtx.fillRect(0, 0, canvas.width, canvas.height);

  canvasCtx.lineWidth = 2;
  canvasCtx.strokeStyle = "#FFD700";

  canvasCtx.beginPath();

  let sliceWidth = canvas.width / bufferLength;
  let x = 0;

  for(let i = 0; i < bufferLength; i++){
    let v = dataArray[i] / 128.0;
    let y = v * canvas.height / 2;

    if(i === 0){
      canvasCtx.moveTo(x, y);
    } else {
      canvasCtx.lineTo(x, y);
    }

    x += sliceWidth;
  }

  canvasCtx.lineTo(canvas.width, canvas.height / 2);
  canvasCtx.stroke();
}

draw();


// ================= AUTOPLAY FIX =================
document.body.addEventListener("click", () => {
  ctx.resume();
});
</script>

</body>
</html>
